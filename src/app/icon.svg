<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="moonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:1" /> <!-- Indigo-400 -->
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" /> <!-- Indigo-600 -->
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Circle Background (Dark Mode glass feel) -->
  <circle cx="16" cy="16" r="15" fill="#1e293b" stroke="#334155" stroke-width="1" />

  <!-- Moon Shape -->
  <path d="M21 9a9 9 0 1 1-9 9 9 9 0 0 0 9-9z" fill="url(#moonGradient)" filter="url(#glow)" />
  
  <!-- Sparkle/Star -->
  <path d="M24 6l1.5 3.5L29 11l-3.5 1.5L24 16l-1.5-3.5L19 11l3.5-1.5z" fill="#fcd34d" />
</svg>
